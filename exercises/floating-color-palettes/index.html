<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating Color Palettes</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="color-palette">
            <h2>Royal Blue Room</h2>
            <h4 id="p1-c1" class="color">#004E96</h4>
            <h4 id="p1-c2" class="color">#A6ABBD</h4>
            <h4 id="p1-c3" class="color">#8F2742</h4>
            <h4 id="p1-c4" class="color">#BFA5A8</h4>
        </div>
        <div class="color-palette">
            <h2>Lagoon</h2>
            <h4 id="p2-c1" class="color">#0099AC</h4>
            <h4 id="p2-c2" class="color">#008867</h4>
            <h4 id="p2-c3" class="color">#62B4A0</h4>
            <h4 id="p2-c4" class="color">#C8E2DA</h4>
        </div>
        <div class="color-palette">
            <h2>Pastel</h2>
            <h4 id="p3-c1" class="color">#eac4d5</h4>
            <h4 id="p3-c2" class="color">#d6eadf</h4>
            <h4 id="p3-c3" class="color">#b8e0d2</h4>
            <h4 id="p3-c4" class="color">#809bce</h4>
            <h4 id="p3-c5" class="color">#C5AFD0</h4>
        </div>
    </body>
</html>
